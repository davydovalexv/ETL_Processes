version: '3.7'

services:
  mongo:
    image: mongo:6.0
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  postgres:
    image: postgres:15
    container_name: postgres
    restart: always
    environment:
      POSTGRES_DB: etl_db
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  postgres-init:
    image: postgres:15
    container_name: postgres-init
    depends_on:
      - postgres
    environment:
      POSTGRES_DB: etl_db
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
    volumes:
      - ./airflow/data/postgres_schema.sql:/postgres_schema.sql:ro
    entrypoint: >
      bash -c "
        until pg_isready -h postgres -U etl_user; do
          echo 'Waiting for postgres...';
          sleep 1;
        done;
        PGPASSWORD=$$POSTGRES_PASSWORD psql -h postgres -U etl_user -d etl_db -f /postgres_schema.sql
      "

  mongo-init:
    image: python:3.10
    container_name: mongo-init
    depends_on:
      - mongo
    volumes:
      - ./airflow/data/generate_mongo_data.py:/generate_mongo_data.py:ro
    command: >
      sh -c "
        pip install pymongo &&
        python /generate_mongo_data.py
      "

  airflow-init:
    build: ./airflow
    container_name: airflow-init
    depends_on:
      - postgres
      - postgres-init
      - mongo
      - mongo-init
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: 'HTPeuJ0SBweNJI00B6SADF0f_J4qdJVRq0jtmp5U_bg='
      AIRFLOW__WEBSERVER__SECRET_KEY: 't9AaQfbLTe2ZERMSW4AyO8a17Qp1wZ35efAbl7efcCo='
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://etl_user:etl_pass@postgres/etl_db
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://etl_user:etl_pass@postgres/etl_db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW_UID: 50000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/data:/opt/airflow/data
    entrypoint: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin --firstname admin --lastname admin --role Admin --email admin@local
      "

  airflow-webserver:
    build: ./airflow
    container_name: airflow-webserver
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      postgres-init:
        condition: service_completed_successfully
      mongo:
        condition: service_started
      mongo-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: 'HTPeuJ0SBweNJI00B6SADF0f_J4qdJVRq0jtmp5U_bg='
      AIRFLOW__WEBSERVER__SECRET_KEY: 't9AaQfbLTe2ZERMSW4AyO8a17Qp1wZ35efAbl7efcCo='
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://etl_user:etl_pass@postgres/etl_db
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://etl_user:etl_pass@postgres/etl_db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW_UID: 50000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/data:/opt/airflow/data
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build: ./airflow
    container_name: airflow-scheduler
    restart: always
    depends_on:
      airflow-init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      postgres-init:
        condition: service_completed_successfully
      mongo:
        condition: service_started
      mongo-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: 'HTPeuJ0SBweNJI00B6SADF0f_J4qdJVRq0jtmp5U_bg='
      AIRFLOW__WEBSERVER__SECRET_KEY: 't9AaQfbLTe2ZERMSW4AyO8a17Qp1wZ35efAbl7efcCo='
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://etl_user:etl_pass@postgres/etl_db
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://etl_user:etl_pass@postgres/etl_db
      AIRFLOW__CORE__LOAD_EXAMPLES: 'False'
      AIRFLOW_UID: 50000
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/data:/opt/airflow/data
    command: scheduler

volumes:
  mongo-data:
  postgres-data: